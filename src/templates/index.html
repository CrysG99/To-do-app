{% extends 'base.html' %}

{% block content %}

<div class="todo">
    <form class="todoform" id="todo-form" action="POST">
        <input name="task" type="text" placeholder="Skriv inn oppgave her: ">
        <select name="priority">
            <option value="" disabled selected>Select priority</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>
        <button class="todobutton" id="todothing">Add task</button>
    </form>
</div>

{% endblock %}
